# --8<-- [end:project]
# --8<-- [start:theme_features]
[project.theme]
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.expand", # "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path", # "navigation.sections",
  "navigation.tabs", # "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]
# --8<-- [end:theme_features]
# --8<-- [start:theme_ui]
favicon = "assets/zensical.png"
language = "en"
logo = "assets/images/talika.png"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
accent = "teal"
media = "(prefers-color-scheme: light)"
primary = "indigo"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
accent = "teal"
media = "(prefers-color-scheme: dark)"
primary = "indigo"
scheme = "slate"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to system preference"

[project.theme.icon]
repo = "material/github"

[project.theme.icon.tag]
default = "lucide/hash"

# --8<-- [end:theme_ui]
[project.extra]
generator = false

[project.extra.tags]
docs = "docs"

[project.plugins.offline]
enabled = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.caret]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
auto_title = true
line_spans = "__span"
# linenums = true
linenums_style = "pymdownx-inline"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md"]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  {name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format"},
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.toc]
permalink = "⚓︎"

[project.markdown_extensions.zensical.extensions.preview]
configurations = [{targets = {include = ["start/**", "learn/**", "guides/**", "reference/**"]}}]
